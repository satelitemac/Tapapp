<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&T | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --bg: #0a0a0a; --panel: #151515; --light: #ffcc00; --dj: #00d4ff; --dmx: #a200ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .panel { background: var(--panel); border-radius: 16px; padding: 25px; border: 1px solid #222; }
        h2 { color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-family: 'Inter'; }
        .btn-prep { background: #444; color: white; }
        .btn-go { background: #2ecc71; color: white; }
        .btn-flash { background: var(--light); color: black; }
        .btn-winner { background: white; color: black; }
        .btn-dmx-on { background: var(--dmx); color: white; }
        .btn-dmx-off { background: transparent; color: white; border: 1px solid #444; }
        .btn-reset { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; margin-top: 10px; font-size: 0.8rem; }
        .btn-nuke { background: #8b0000; color: white; padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; border: none; cursor: pointer; }
        #user-list { background: #000; border-radius: 8px; padding: 10px; font-family: 'Space Mono'; font-size: 0.75rem; color: #888; height: 100px; overflow-y: auto; border: 1px solid #222; }
        #ganador-actual { background: #000; border-radius: 10px; padding: 15px; margin-top: 10px; text-align: center; color: #2ecc71; font-weight: 900; border: 2px dashed #333; }
        #chat-box { height: 150px; overflow-y: auto; background: #000; padding: 15px; font-family: 'Space Mono', monospace; font-size: 0.85rem; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column-reverse; }
        #dmx-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; margin-left: 10px; }
        .status-off { background: #444; }
        .status-on { background: var(--dmx); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1 style="text-align:center; font-size: 1.2rem; margin-bottom: 30px;">T&T <span style="color:var(--accent)">COMMAND CENTER</span></h1>

    <div class="grid">
        <div class="panel">
            <h2>
                <span>👥 ONLINE: <span id="user-count">0</span></span>
                <button class="btn-nuke" onclick="if(confirm('¿Borrar memoria de todos los móviles?')) sendAction('hard_reset')">☢️ LIMPIAR</button>
            </h2>
            <div id="user-list">Esperando conexiones...</div>
            <div id="ganador-actual">ESPERANDO...</div>
        </div>

        <div class="panel">
            <h2>🕹️ RADAR</h2>
            <div class="controls">
                <button class="btn btn-prep" onclick="sendAction('prepare_contest')">1. Preparar</button>
                <button class="btn btn-go" onclick="sendAction('go_pulsar')">2. ¡DALE!</button>
                <button class="btn btn-reset" onclick="sendAction('reset')">Resetear Radar</button>
            </div>
        </div>

        <div class="panel" style="grid-column: span 2; border: 1px solid var(--dmx);">
            <h2>
                <span>🎵 MODO SHOW (ART-NET / RESOLUME)</span>
                <span id="dmx-status" class="status-off">OFF</span>
            </h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-dmx-on" onclick="toggleDMX(true)">ACTIVAR CONTROL LIVE</button>
                <button class="btn btn-dmx-off" onclick="toggleDMX(false)">DESACTIVAR</button>
            </div>
            <p style="font-size: 0.7rem; color: #666; margin-top: 10px; font-family: 'Space Mono'; text-align: center;">
                Puerto: 6454 | Universo: 0 | Mapeo: 3 Ch/User (RGB)
            </p>
        </div>

        <div class="panel" style="grid-column: span 2;">
            <h2>🔦 LINTERNAS Y COLOR MANUAL</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: center;">
                <input type="color" id="action-color" value="#ffffff" style="width: 100%; height: 55px; border-radius: 10px; border: none; background: #333; cursor: pointer;">
                <button class="btn btn-flash" onclick="sendAction('start_flashing')">⚡ PARPADEAR</button>
                <button class="btn btn-winner" onclick="sendAction('stop_flashing')">🌟 ELEGIR GANADOR</button>
            </div>
        </div>

        <div class="panel" style="grid-column: span 2;">
            <h2>🎧 HEY DJ! (PETICIONES)</h2>
            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://tapapp.onrender.com/ws');
        let activeUsers = new Set();

        function sendAction(action) {
            const color = document.getElementById('action-color').value;
            let payload = { 
                "type": "admin_action", 
                "action": action, 
                "color": color, 
                "user_id": "ADMIN_PANEL" 
            };

            if (action === "stop_flashing") {
                const usersArr = Array.from(activeUsers);
                if (usersArr.length > 0) {
                    payload.force_winner = usersArr[Math.floor(Math.random() * usersArr.length)];
                }
            }

            if (socket.readyState === 1) {
                socket.send(JSON.stringify(payload));
            }
        }

        // NUEVA FUNCIÓN PARA EL MODO DMX
        function toggleDMX(state) {
            if (socket.readyState === 1) {
                socket.send(JSON.stringify({
                    "action": "toggle_dmx",
                    "value": state
                }));
                
                // Actualizar UI localmente
                const status = document.getElementById('dmx-status');
                status.innerText = state ? "ON" : "OFF";
                status.className = state ? "status-on" : "status-off";
            }
        }

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.action === "update_users") {
                activeUsers = new Set(data.users);
                updateUI();
            }

            if (data.action === "winner_found" || data.action === "light_winner_found" || (data.action === "stop_flashing" && data.force_winner)) {
                const winnerName = data.winner_id || data.force_winner;
                document.getElementById('ganador-actual').innerText = "🏆 " + winnerName;
            }

            if (data.action === "reset") {
                document.getElementById('ganador-actual').innerText = "ESPERANDO...";
            }

            if (data.type === "chat") {
                const box = document.getElementById('chat-box');
                const msg = document.createElement('div');
                msg.style.padding = "8px 0";
                msg.style.borderBottom = "1px solid #222";
                msg.innerHTML = `<span style="color: var(--accent); font-weight: bold;">${data.user_id}:</span> 
                                 <span style="color: #00d4ff;">${data.text}</span>`;
                box.prepend(msg); 
            }
        };

        function updateUI() {
            document.getElementById('user-count').innerText = activeUsers.size;
            document.getElementById('user-list').innerText = Array.from(activeUsers).join(", ");
        }

        socket.onopen = () => {
            socket.send(JSON.stringify({ "type": "presence", "user_id": "ADMIN_PANEL" }));
        };
        
        socket.onclose = () => setTimeout(() => location.reload(), 1500);
    </script>
</body>
</html>
