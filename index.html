<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T | RADAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --dj: #00d4ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; z-index: 10; }
        .input-field { width: 85%; max-width: 300px; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; background: #1a1a1a; color: white; font-size: 1.1rem; text-align: center; }
        .menu-btn { width: 100%; max-width: 280px; padding: 20px; margin: 10px; border-radius: 15px; border: 2px solid var(--accent); background: transparent; color: white; font-weight: 900; font-size: 1.2rem; }
        .radar-btn { width: 220px; height: 220px; border-radius: 50%; border: 10px solid white; background: none; color: white; font-size: 1.8rem; font-weight: 900; }
    </style>
</head>
<body>
    <div id="sc-login" class="screen active">
        <h1 style="color:var(--accent); font-size: 3rem;">HOLA!</h1>
        <input type="text" id="n" class="input-field" placeholder="Nombre">
        <input type="text" id="m" class="input-field" placeholder="Mesa">
        <button class="menu-btn" onclick="entrar()" style="background:var(--accent); border:none;">ENTRAR</button>
    </div>

    <div id="sc-wait" class="screen">
        <h1 style="color:var(--accent)">CONECTADO</h1>
        <p>Espera a que el DJ active el Radar...</p>
        <button class="menu-btn" style="border-color:var(--dj); color:var(--dj)" onclick="showMsg()">💬 MANDAR NOTA AL DJ</button>
    </div>

    <div id="sc-radar" class="screen">
        <h2 id="status">¡LISTOS!</h2>
        <button id="btn-p" class="radar-btn" onclick="pulsar()" disabled>ESPERA</button>
    </div>

    <script>
        let myId = "", socket = new WebSocket('wss://tapapp.onrender.com/ws');

        function entrar() {
            const name = document.getElementById('n').value, mesa = document.getElementById('m').value;
            if(!name || !mesa) return;
            myId = name + " (Mesa " + mesa + ")";
            if(socket.readyState === 1) socket.send(JSON.stringify({type:"presence", user_id: myId}));
            showScreen('sc-wait');
        }

        function pulsar() { socket.send(JSON.stringify({type:"player_click", user_id: myId})); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.action === "prepare_contest") {
                showScreen('sc-radar');
                document.getElementById('btn-p').disabled = true;
                document.getElementById('btn-p').innerText = "ESPERA";
            }
            if(d.action === "go_pulsar") {
                document.getElementById('btn-p').disabled = false;
                document.getElementById('btn-p').innerText = "¡DALE YA!";
            }
            if(d.action === "winner_found") {
                document.getElementById('btn-p').innerText = (d.winner_id === myId) ? "¡GANASTE!" : "CASI...";
                document.getElementById('btn-p').disabled = true;
                setTimeout(() => showScreen('sc-wait'), 4000);
            }
            if(d.action === "reset") location.reload();
        };

        setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);
    </script>
</body>
</html>
