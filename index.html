<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T | TECHNICS UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff3c00; } /* Rojo Technics */
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #000; font-family: 'Inter', sans-serif;
            overflow: hidden; color: white;
        }

        /* EL CHASIS: Imagen fija anclada abajo para que no baile */
        .technics-chassis {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('SASDDASDA.jpg') no-repeat center bottom;
            background-size: cover;
            z-index: -1;
        }

        /* ESCUDO PARA MÓVIL HORIZONTAL */
        @media (orientation: landscape) {
            body::after {
                content: "POR FAVOR, GIRA EL MÓVIL 📱";
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #000; display: flex; align-items: center; justify-content: center;
                color: var(--accent); font-weight: 900; z-index: 100000;
            }
        }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; box-sizing: border-box; padding: 20px; }
        .active { display: flex; z-index: 10; }

        /* LOGO SUPERIOR */
        .tt-logo {
            margin-top: 5vh;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.9);
        }

        /* CONTENEDOR NOW PLAYING (Sobre el plato) */
        #now-playing-container { 
            margin-top: 2vh;
            width: 80%; max-width: 280px;
            text-align: center;
        }

        #now-playing-img { 
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .track-info { margin-top: 15px; }
        #np-track { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 0; text-shadow: 0 2px 10px #000; }
        #np-artist { font-weight: 400; font-size: 0.8rem; color: var(--accent); margin: 5px 0; letter-spacing: 2px; text-transform: uppercase; }

        /* ZONA DE CONTROLES (Mapeada sobre el botón START/STOP) */
        .controls-area {
            position: absolute;
            bottom: 6vh; /* Ajuste para caer sobre el botón físico */
            width: 85%; max-width: 300px;
        }

        .technics-btn {
            width: 100%; padding: 18px;
            background: rgba(20,20,20,0.4); /* Casi transparente para ver el botón debajo */
            color: #eee; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; backdrop-filter: blur(2px);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }

        .technics-btn:active { transform: translateY(2px); color: var(--accent); }
        .technics-label { font-size: 0.45rem; margin-top: 4px; opacity: 0.6; letter-spacing: 3px; }

        /* INPUTS Y LOGIN */
        .input-field { width: 100%; max-width: 280px; padding: 18px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.7); color: white; text-align: center; backdrop-filter: blur(10px); }
        .btn-login { width: 100%; max-width: 280px; padding: 20px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 900; font-size: 1.2rem; }
        
        .radar-btn { width: 200px; height: 200px; border-radius: 50%; border: 10px solid white; background: none; color: white; font-size: 1.8rem; font-weight: 900; }
        #flash-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:none; pointer-events: none; }
    </style>
</head>
<body>
    <div class="technics-chassis"></div>
    <div id="flash-overlay"></div>

    <div id="sc-login" class="screen active">
        <div class="tt-logo">TAPES & TAPAS</div>
        <div style="margin-top: 10vh; width: 100%; display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="n" class="input-field" placeholder="Nombre">
            <input type="text" id="m" class="input-field" placeholder="Mesa">
            <button class="btn-login" onclick="init()">ENTRAR</button>
        </div>
    </div>

    <div id="sc-wait" class="screen">
        <div class="tt-logo">TAPES & TAPAS</div>
        
        <div id="now-playing-container" style="display: none;">
            <img id="now-playing-img" src="">
            <div class="track-info">
                <p id="np-track">BRING ON THE NIGHT</p>
                <p id="np-artist">THE POLICE</p>
            </div>
        </div>

        <div class="controls-area">
            <input type="text" id="msg-dj" class="input-field" placeholder="¿Petición para el DJ?" style="margin-bottom: 15px; display:none;" id="chat-box">
            <button class="technics-btn" onclick="handleDJClick(event)">
                <span id="btn-dj-text">TEXT TO DJ</span>
                <span class="technics-label">START · STOP</span>
            </button>
        </div>
    </div>

    <div id="sc-radar" class="screen">
        <button id="btn-p" class="radar-btn" onclick="pulsar()">ESPERA</button>
    </div>

    <script>
        let myId = localStorage.getItem("tt_user_id") || ""; 
        let socket = new WebSocket('wss://tapapp.onrender.com/ws');
        let videoTrack = null, flashInt = null, wakeLock = null;

        window.onload = () => {
            if (myId) { showScreen('sc-wait'); setupHardware(); } 
            else { showScreen('sc-login'); }
        };

        socket.onopen = () => {
            if (myId) socket.send(JSON.stringify({type:"presence", user_id: myId}));
        };

        async function init() {
            const name = document.getElementById('n').value;
            const mesa = document.getElementById('m').value;
            if(!name || !mesa) return;
            myId = `${name} (Mesa ${mesa})`;
            localStorage.setItem("tt_user_id", myId);
            showScreen('sc-wait');
            setupHardware();
            if(socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({type:"presence", user_id: myId}));
        }

        async function setupHardware() {
            if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                videoTrack = s.getVideoTracks()[0];
            } catch(e) { console.log("Sin linterna"); }
        }

        function pulsar() { socket.send(JSON.stringify({type:"player_click", user_id: myId})); }

        // Manejador del botón START/STOP para el DJ
        function handleDJClick(event) {
            const input = document.getElementById('msg-dj');
            const btnText = document.getElementById('btn-dj-text');
            
            if (input.style.display === "none") {
                input.style.display = "block";
                btnText.innerText = "ENVIAR";
                input.focus();
            } else {
                const txt = input.value.trim();
                if (txt) {
                    socket.send(JSON.stringify({type: "chat", user_id: myId, text: txt }));
                    input.value = "";
                    input.style.display = "none";
                    btnText.innerText = "¡ENVIADO!";
                    setTimeout(() => { btnText.innerText = "TEXT TO DJ"; }, 2000);
                } else {
                    input.style.display = "none";
                    btnText.innerText = "TEXT TO DJ";
                }
            }
        }

        socket.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            const overlay = document.getElementById('flash-overlay');

            if(data.action === "update_cover") {
                const container = document.getElementById('now-playing-container');
                if(data.url && data.url !== "") {
                    document.getElementById('now-playing-img').src = data.url;
                    document.getElementById('np-artist').innerText = data.artist || "ARTISTA";
                    document.getElementById('np-track').innerText = data.track || "PISTA";
                    container.style.display = "block";
                } else { container.style.display = "none"; }
            }

            if(data.action === "prepare_contest") {
                showScreen('sc-radar');
                const btn = document.getElementById('btn-p');
                btn.disabled = true; btn.innerText = "ESPERA";
                document.body.style.backgroundColor = "#000";
            }
            
            if(data.action === "go_pulsar") {
                const btn = document.getElementById('btn-p');
                btn.disabled = false; btn.innerText = "¡DALE!";
            }

            if(data.action === "winner_found") {
                const win = data.winner_id === myId;
                document.getElementById('btn-p').innerText = win ? "¡GANASTE!" : "CASI...";
                document.body.style.backgroundColor = win ? "#2ecc71" : "#8b0000";
            }

            if(data.action === "start_flashing") {
                overlay.style.display = "block";
                clearInterval(flashInt);
                flashInt = setInterval(async () => {
                    const isBlack = overlay.style.backgroundColor === 'black' || overlay.style.backgroundColor === '';
                    overlay.style.backgroundColor = isBlack ? (data.color || "#ffffff") : 'black';
                    if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isBlack}]}).catch(()=>{});
                }, 130);
            }

            if(data.action === "stop_flashing") {
                clearInterval(flashInt);
                const isWinner = data.force_winner === myId;
                overlay.style.backgroundColor = isWinner ? (data.color || "#ffffff") : "black";
                if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isWinner}]}).catch(()=>{});
            }

            if(data.action === "reset") {
                clearInterval(flashInt);
                overlay.style.display = "none";
                document.body.style.backgroundColor = "#000";
                if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: false}]}).catch(()=>{});
                showScreen('sc-wait');
            }

            if(data.action === "hard_reset") {
                localStorage.removeItem("tt_user_id");
                location.reload();
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);
    </script>
</body>
</html>
