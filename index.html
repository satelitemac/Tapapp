<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T&T | EVENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff5e00; 
            --tech-gray: #1a1a1a; 
        }

        /* Forzamos a que el fondo exterior sea siempre negro puro */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #000;
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTENEDOR MÁGICO: Mantiene la proporción exacta del casete */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px; /* Límite para pantallas grandes o tablets */
            max-height: 100vh;
            background-image: url('fondo-cassette.jpg'); 
            background-size: contain; /* Cambiado a contain para que NUNCA se corte el casete */
            background-position: center;
            background-repeat: no-repeat;
            box-sizing: border-box;
        }

        /* Las pantallas ahora se adaptan al área interna del contenedor del casete */
        .screen { 
            display: none; 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
            padding: 20px;
        }
        .active { display: flex; z-index: 10; }
        
        .tt-logo {
            font-weight: 900; font-size: 2rem; 
            letter-spacing: -1px; text-transform: uppercase;
            color: #1a1a1a;
            margin-top: 15vh; /* Empuja el título según la altura del casete */
            margin-bottom: 20px;
        }

        /* Pantalla de peticiones (Espera) con márgenes perfectos sobre la pegatina */
        #sc-wait.active {
            justify-content: flex-start;
            padding-top: 28vh; /* Centrado vertical exacto sobre el espacio en blanco del casete */
        }

        /* Contenedor dinámico para lo que llega del Servidor (Portada + Info) */
        #now-playing-container { 
            width: 85%; 
            max-width: 260px;
            margin-bottom: 15px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        /* Contenedor interno del texto dinámico del servidor */
        .live-info {
            width: 100%;
            text-align: center;
            margin-bottom: 8px;
        }
        #np-artist { 
            color: var(--accent); 
            font-weight: 900; 
            margin: 0; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        #np-track { 
            color: #1a1a1a; 
            font-weight: 800; 
            margin: 3px 0 0 0; 
            font-size: 1rem; 
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Si el título es muy largo, añade "..." de forma elegante */
        }

        #now-playing-img { 
            width: 65%; /* Reducido un poco para que no rompa los márgenes verticales */
            aspect-ratio: 1/1; 
            border-radius: 8px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.3); 
            object-fit: cover;
        }

        /* Área general que envuelve los formularios y botones */
        .controls-area { 
            width: 85%; 
            max-width: 280px; 
            margin-top: auto; /* Empuja los controles hacia abajo dentro de los límites */
            margin-bottom: 12vh; /* Evita que el botón se salga por abajo en pantallas cortas */
        }
        
        .input-field { 
            width: 100%; 
            padding: 12px 10px; 
            margin-bottom: 12px; 
            border: none; 
            background: transparent; 
            border-bottom: 2px solid rgba(0,0,0,0.15); 
            color: #1a1a1a; 
            text-align: center; 
            font-size: 1.05rem; 
            font-weight: 800;
            box-sizing: border-box; 
        }
        .input-field::placeholder { color: rgba(0,0,0,0.35); }
        .input-field:focus { outline: none; border-bottom: 2px solid var(--accent); }
        
        .technics-btn { 
            width: 100%; padding: 15px; border-radius: 30px; border: none; 
            background: var(--accent); color: white; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
            box-sizing: border-box;
        }
        .technics-btn:active { transform: translateY(2px); box-shadow: 0px 2px 0px rgba(0,0,0,0.15); }
        
        /* Pantalla Radar (Ajustada al nuevo layout) */
        #sc-radar { background: rgba(0,0,0,0.85); color: white; }
        #sc-radar .tt-logo { color: white; margin-top: 15vh; }
        .radar-container {
            display: flex; height: 100%; width: 100%;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .radar-btn { 
            width: 180px; height: 180px; border-radius: 50%; border: 8px solid white; 
            background: none; color: white; font-size: 1.6rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        #flash-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div class="app-container">

        <div id="sc-login" class="screen active">
            <div class="tt-logo" style="color:var(--accent)">HOLA!</div>
            <div class="controls-area">
                <input type="text" id="n" class="input-field" placeholder="Nombre">
                <input type="text" id="m" class="input-field" placeholder="Mesa">
                <button class="technics-btn" onclick="init()">ENTRAR</button>
            </div>
        </div>

        <div id="sc-wait" class="screen">
            <div id="now-playing-container" style="display: none;">
                <div class="live-info">
                    <p id="np-artist"></p>
                    <p id="np-track"></p>
                </div>
                <img id="now-playing-img" src="">
            </div>
            
            <div class="controls-area">
                <input type="text" id="msg-dj" class="input-field" placeholder="¿Alguna petición?">
                <button class="technics-btn" onclick="sendDJ(event)">
                    <span id="btn-dj-text">Enviar DJ</span>
                </button>
            </div>
        </div>

        <div id="sc-radar" class="screen">
            <div class="radar-container">
                <div class="tt-logo">¡ATENCION!</div>
                <button id="btn-p" class="radar-btn" onclick="pulsar()">ESPERA</button>
            </div>
        </div>

    </div>

    <script>
    let myId = localStorage.getItem("tt_user_id") || ""; 
    let socket = new WebSocket('wss://tapapp.onrender.com/ws');
    let videoTrack = null, flashInt = null, wakeLock = null;
    
    let currentFlashSpeed = 130; 
    let isFlashing = false;      
    let lastColor = "#ffffff";   

    window.onload = () => {
        if (myId) { 
            showScreen('sc-wait'); 
            setupHardware(); 
        } else { 
            showScreen('sc-login'); 
        }

        fetch('https://tapapp.onrender.com/current_status')
            .then(() => console.log("Servidor despertado"))
            .catch(err => console.log("Error al despertar:", err));
    };

    socket.onopen = () => {
        if (myId) socket.send(JSON.stringify({type:"presence", user_id: myId}));
    };

    function startFlashingLoop() {
        clearInterval(flashInt);
        flashInt = setInterval(async () => {
            const overlay = document.getElementById('flash-overlay');
            const isBlack = overlay.style.backgroundColor === 'black' || overlay.style.backgroundColor === '';
            overlay.style.backgroundColor = isBlack ? lastColor : 'black';
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isBlack}]}).catch(()=>{});
        }, currentFlashSpeed);
    }

    socket.onmessage = async (e) => {
        const data = JSON.parse(e.data);
        
        if (data.action === "dmx_live") {
            if (data.target_id && data.target_id !== myId) return;
            isFlashing = false; 
            clearInterval(flashInt);
            const overlay = document.getElementById('flash-overlay');
            overlay.style.display = "block";
            if (overlay.style.backgroundColor !== data.color) overlay.style.backgroundColor = data.color;
            if (videoTrack) {
                videoTrack.applyConstraints({advanced: [{ torch: data.torch }]}).catch(() => {});
            }
            return; 
        }

        if (data.action === "set_bpm") {
            currentFlashSpeed = Math.round((60000 / data.bpm) / 2);
            if (isFlashing) startFlashingLoop();
        }

        if(data.action === "hard_reset") { hardReset(); return; }

        if(data.action === "reset") {
            isFlashing = false;
            clearInterval(flashInt);
            document.getElementById('flash-overlay').style.display = "none";
            document.body.style.backgroundColor = ""; 
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: false}]}).catch(()=>{});
            showScreen('sc-wait');
        }

        /* Manejo robusto del contenido del servidor */
        if(data.action === "update_cover") {
            const container = document.getElementById('now-playing-container');
            if(data.url && data.url !== "") {
                document.getElementById('now-playing-img').src = data.url;
                document.getElementById('np-artist').innerText = data.artist || "ARTISTA";
                document.getElementById('np-track').innerText = data.track || "PISTA";
                container.style.display = "flex"; 
            } else { container.style.display = "none"; }
        }

        if(data.action === "prepare_contest") {
            showScreen('sc-radar');
            const btn = document.getElementById('btn-p');
            btn.disabled = true; btn.innerText = "ESPERA";
        }
        
        if(data.action === "go_pulsar") {
            const btn = document.getElementById('btn-p');
            btn.disabled = false; btn.innerText = "¡PUSH!";
        }

        if(data.action === "winner_found") {
            const win = data.winner_id === myId;
            document.getElementById('btn-p').innerText = win ? "¡GANASTE!" : "CASI...";
            document.getElementById('sc-radar').style.backgroundColor = win ? "rgba(46, 204, 113, 0.9)" : "rgba(139, 0, 0, 0.9)";
        }

        if(data.action === "start_flashing") {
            isFlashing = true;
            lastColor = data.color || "#ffffff";
            document.getElementById('flash-overlay').style.display = "block";
            startFlashingLoop(); 
        }

        if(data.action === "stop_flashing") {
            isFlashing = false;
            clearInterval(flashInt);
            const isWinner = data.force_winner === myId;
            document.getElementById('flash-overlay').style.backgroundColor = isWinner ? (data.color || "#ffffff") : "black";
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isWinner}]}).catch(()=>{});
        }
    };

    async function init() {
        const name = document.getElementById('n').value;
        const mesa = document.getElementById('m').value;
        if(!name || !mesa) return;
        myId = `${name} (Mesa ${mesa})`;
        localStorage.setItem("tt_user_id", myId);
        showScreen('sc-wait');
        setupHardware();
        if(socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({type:"presence", user_id: myId}));
    }

    function hardReset() {
        localStorage.removeItem("tt_user_id");
        location.reload();
    }

    async function setupHardware() {
        if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
        try {
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            videoTrack = s.getVideoTracks()[0];
        } catch(e) { console.log("Sin linterna"); }
    }

    function pulsar() { socket.send(JSON.stringify({type:"player_click", user_id: myId})); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);

    function sendDJ(event) {
        const input = document.getElementById('msg-dj');
        const txt = input.value.trim();
        if(!txt) return;
        socket.send(JSON.stringify({type: "chat", user_id: myId, text: txt }));
        input.value = "";
        const btnText = document.getElementById('btn-dj-text');
        const originalText = btnText.innerText;
        btnText.innerText = "¡ENVIADO!";
        setTimeout(() => { btnText.innerText = originalText; }, 2000);
    }
</script>
</body>
</html>
