<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T&T | EVENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff5e00; 
            --tech-gray: #1a1a1a; 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #000;
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTENEDOR TOTAL: Ocupa el 100% del lienzo del teléfono móvil */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px; /* Consistencia en pantallas más anchas o simulación de PC */
            background-image: url('fondo-cassette.jpg'); 
            background-size: cover; /* Asegura que cubra toda la pantalla de arriba a abajo */
            background-position: center top;
            background-repeat: no-repeat;
            box-sizing: border-box;
        }

        /* Capas absolutas para las secciones */
        .screen { 
            display: none; 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
        }
        .active { display: flex; z-index: 10; }
        
        /* Pantalla de bienvenida / Login */
        #sc-login .tt-logo {
            font-weight: 900; font-size: 2.2rem; color: var(--accent);
            margin-top: 15vh;
        }

        /* LA CAJA DINÁMICA: Ajustada milimétricamente a la pegatina blanca del nuevo casete vertical */
        .cassette-label-box {
            position: absolute;
            top: 21vh;       /* Posición exacta en el eje vertical de las líneas de la cinta */
            left: 12%;       /* Centrado horizontal respecto al cuerpo del casete */
            width: 76%;      /* Ancho útil de la pegatina blanca */
            height: 38vh;    /* Altura total que cubre el bloque para escribir */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 8px;
            /* background: rgba(255, 0, 0, 0.15); */ /* Descomenta para ver la caja durante las pruebas si es necesario */
        }

        /* Contenedor del Servidor (Contenido dinámico de música) */
        #now-playing-container { 
            width: 100%;
            height: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between; /* Texto arriba, portada abajo */
        }
        
        .live-info {
            width: 100%;
            text-align: center;
            padding-top: 5px;
        }
        
        /* Nombre de artista en formato compacto superior */
        #np-artist { 
            color: var(--accent); 
            font-weight: 900; 
            margin: 0; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        
        /* Nombre de la canción ocupando la línea principal */
        #np-track { 
            color: #1a1a1a; 
            font-weight: 800; 
            margin: 2px 0 0 0; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Portada encajada en la sección central-inferior de la pegatina */
        #now-playing-img { 
            height: 68%; /* Proporción limpia para no pisar los engranajes o textos */
            aspect-ratio: 1/1; 
            border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            object-fit: cover;
            margin-bottom: 4px;
        }

        /* CONTROLES INFERIORES: Posicionados sobre la parte baja del casete */
        .controls-area { 
            position: absolute;
            bottom: 7vh; /* Ajustado para quedar por encima del borde inferior de la pantalla */
            width: 80%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .input-field { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            border: none; 
            background: transparent; 
            border-bottom: 2px solid rgba(0,0,0,0.2); 
            color: #1a1a1a; 
            text-align: center; 
            font-size: 1.1rem; 
            font-weight: 800;
            box-sizing: border-box; 
        }
        .input-field::placeholder { color: rgba(0,0,0,0.4); }
        .input-field:focus { outline: none; border-bottom: 2px solid var(--accent); }
        
        .technics-btn { 
            width: 100%; padding: 15px; border-radius: 30px; border: none; 
            background: var(--accent); color: white; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .technics-btn:active { transform: translateY(2px); }
        
        /* Pantalla de alerta del Radar */
        #sc-radar { background: rgba(0,0,0,0.92); color: white; }
        .radar-container {
            display: flex; height: 100%; width: 100%;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .radar-btn { 
            width: 170px; height: 170px; border-radius: 50%; border: 8px solid white; 
            background: none; color: white; font-size: 1.7rem; font-weight: 900;
        }

        #flash-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div class="app-container">

        <div id="sc-login" class="screen active">
            <div class="tt-logo">HOLA!</div>
            <div class="controls-area">
                <input type="text" id="n" class="input-field" placeholder="Nombre">
                <input type="text" id="m" class="input-field" placeholder="Mesa">
                <button class="technics-btn" onclick="init()">ENTRAR</button>
            </div>
        </div>

        <div id="sc-wait" class="screen">
            
            <div class="cassette-label-box">
                <div id="now-playing-container" style="display: none;">
                    <div class="live-info">
                        <p id="np-artist"></p>
                        <p id="np-track"></p>
                    </div>
                    <img id="now-playing-img" src="">
                </div>
            </div>
            
            <div class="controls-area">
                <input type="text" id="msg-dj" class="input-field" placeholder="¿Alguna petición?">
                <button class="technics-btn" onclick="sendDJ(event)">
                    <span id="btn-dj-text">Enviar DJ</span>
                </button>
            </div>
        </div>

        <div id="sc-radar" class="screen">
            <div class="radar-container">
                <div class="tt-logo" style="color:white; margin-bottom:30px;">¡ATENCION!</div>
                <button id="btn-p" class="radar-btn" onclick="pulsar()">ESPERA</button>
            </div>
        </div>

    </div>

    <script>
    let myId = localStorage.getItem("tt_user_id") || ""; 
    let socket = new WebSocket('wss://tapapp.onrender.com/ws');
    let videoTrack = null, flashInt = null, wakeLock = null;
    let currentFlashSpeed = 130; 
    let isFlashing = false;      
    let lastColor = "#ffffff";   

    window.onload = () => {
        if (myId) { showScreen('sc-wait'); setupHardware(); } else { showScreen('sc-login'); }
        fetch('https://tapapp.onrender.com/current_status').catch(err => console.log(err));
    };

    socket.onopen = () => { if (myId) socket.send(JSON.stringify({type:"presence", user_id: myId})); };

    function startFlashingLoop() {
        clearInterval(flashInt);
        flashInt = setInterval(async () => {
            const overlay = document.getElementById('flash-overlay');
            const isBlack = overlay.style.backgroundColor === 'black' || overlay.style.backgroundColor === '';
            overlay.style.backgroundColor = isBlack ? lastColor : 'black';
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isBlack}]}).catch(()=>{});
        }, currentFlashSpeed);
    }

    socket.onmessage = async (e) => {
        const data = JSON.parse(e.data);
        if (data.action === "dmx_live") {
            if (data.target_id && data.target_id !== myId) return;
            isFlashing = false; clearInterval(flashInt);
            const overlay = document.getElementById('flash-overlay');
            overlay.style.display = "block";
            overlay.style.backgroundColor = data.color;
            if (videoTrack) videoTrack.applyConstraints({advanced: [{ torch: data.torch }]}).catch(() => {});
            return; 
        }
        if (data.action === "set_bpm") {
            currentFlashSpeed = Math.round((60000 / data.bpm) / 2);
            if (isFlashing) startFlashingLoop();
        }
        if(data.action === "hard_reset") { hardReset(); return; }
        if(data.action === "reset") {
            isFlashing = false; clearInterval(flashInt);
            document.getElementById('flash-overlay').style.display = "none";
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: false}]}).catch(()=>{});
            showScreen('sc-wait');
        }

        /* Sincronización del contenido en tiempo real del servidor */
        if(data.action === "update_cover") {
            const container = document.getElementById('now-playing-container');
            if(data.url && data.url !== "") {
                document.getElementById('now-playing-img').src = data.url;
                document.getElementById('np-artist').innerText = data.artist || "ARTISTA";
                document.getElementById('np-track').innerText = data.track || "PISTA";
                container.style.display = "flex"; 
            } else { container.style.display = "none"; }
        }

        if(data.action === "prepare_contest") {
            showScreen('sc-radar');
            const btn = document.getElementById('btn-p');
            btn.disabled = true; btn.innerText = "ESPERA";
        }
        if(data.action === "go_pulsar") {
            const btn = document.getElementById('btn-p');
            btn.disabled = false; btn.innerText = "¡PUSH!";
        }
        if(data.action === "winner_found") {
            const win = data.winner_id === myId;
            document.getElementById('btn-p').innerText = win ? "¡GANASTE!" : "CASI...";
            document.getElementById('sc-radar').style.backgroundColor = win ? "rgba(46, 204, 113, 0.9)" : "rgba(139, 0, 0, 0.9)";
        }
        if(data.action === "start_flashing") {
            isFlashing = true; lastColor = data.color || "#ffffff";
            document.getElementById('flash-overlay').style.display = "block";
            startFlashingLoop(); 
        }
        if(data.action === "stop_flashing") {
            isFlashing = false; clearInterval(flashInt);
            const isWinner = data.force_winner === myId;
            document.getElementById('flash-overlay').style.backgroundColor = isWinner ? (data.color || "#ffffff") : "black";
            if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isWinner}]}).catch(()=>{});
        }
    };

    async function init() {
        const name = document.getElementById('n').value;
        const mesa = document.getElementById('m').value;
        if(!name || !mesa) return;
        myId = `${name} (Mesa ${mesa})`;
        localStorage.setItem("tt_user_id", myId);
        showScreen('sc-wait');
        setupHardware();
        if(socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({type:"presence", user_id: myId}));
    }

    function hardReset() { localStorage.removeItem("tt_user_id"); location.reload(); }
    async function setupHardware() {
        if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
        try { const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}); videoTrack = s.getVideoTracks()[0]; } catch(e){}
    }
    function pulsar() { socket.send(JSON.stringify({type:"player_click", user_id: myId})); }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);

    function sendDJ(event) {
        const input = document.getElementById('msg-dj');
        const txt = input.value.trim();
        if(!txt) return;
        socket.send(JSON.stringify({type: "chat", user_id: myId, text: txt }));
        input.value = "";
        const btnText = document.getElementById('btn-dj-text');
        const originalText = btnText.innerText;
        btnText.innerText = "¡ENVIADO!";
        setTimeout(() => { btnText.innerText = originalText; }, 2000);
    }
</script>
</body>
</html>
