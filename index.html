<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T | RADAR APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --dj: #00d4ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; transition: background 0.4s; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; z-index: 10; }
        .input-field { width: 85%; max-width: 300px; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; background: #1a1a1a; color: white; font-size: 1.1rem; text-align: center; }
        .menu-btn { width: 100%; max-width: 280px; padding: 20px; border-radius: 15px; border: 2px solid var(--accent); background: transparent; color: white; font-weight: 900; font-size: 1.2rem; }
        .radar-btn { width: 220px; height: 220px; border-radius: 50%; border: 10px solid white; background: none; color: white; font-size: 1.8rem; font-weight: 900; }
        #flash-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:none; }
    </style>
</head>
<body>
    <div id="sc-login" class="screen active">
        <h1 style="color:var(--accent)">HOLA!</h1>
        <input type="text" id="n" class="input-field" placeholder="Nombre">
        <input type="text" id="m" class="input-field" placeholder="Mesa">
        <button class="menu-btn" onclick="init()" style="background:var(--accent); border:none;">ENTRAR</button>
    </div>

    <div id="sc-wait" class="screen">
        <h1 style="color:var(--accent)">CONECTADO</h1>
        <p>Espera a que el DJ active el radar...</p>
    </div>

    <div id="sc-radar" class="screen">
        <h2 id="status">¡PREPARADOS!</h2>
        <button id="btn-p" class="radar-btn" onclick="pulsar()" disabled>ESPERA</button>
    </div>

    <div id="flash-overlay"></div>

    <script>
        let myId = "", socket = new WebSocket('wss://tapapp.onrender.com/ws'), videoTrack = null, flashInt = null;

        async function init() {
            const name = document.getElementById('n').value, mesa = document.getElementById('m').value;
            if(!name || !mesa) return;
            myId = name + " (Mesa " + mesa + ")";
            socket.send(JSON.stringify({type:"presence", user_id: myId}));
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                videoTrack = s.getVideoTracks()[0];
            } catch(e) {}
            showScreen('sc-wait');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function pulsar() { socket.send(JSON.stringify({type:"player_click", user_id: myId})); }

        socket.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            const overlay = document.getElementById('flash-overlay');

            if(data.action === "prepare_contest") {
                showScreen('sc-radar');
                document.getElementById('btn-p').disabled = true;
                document.getElementById('btn-p').innerText = "ESPERA";
            }
            if(data.action === "go_pulsar") {
                document.getElementById('btn-p').disabled = false;
                document.getElementById('btn-p').innerText = "¡DALE!";
            }
            if(data.action === "winner_found") {
                document.getElementById('btn-p').innerText = (data.winner_id === myId) ? "¡GANASTE!" : "CASI...";
                document.body.style.backgroundColor = (data.winner_id === myId) ? "#2ecc71" : "#8b0000";
            }
            
            // LÓGICA DE LINTERNAS
            if(data.action === "start_flashing") {
                overlay.style.display = "block";
                flashInt = setInterval(async () => {
                    const isBlack = overlay.style.backgroundColor === 'black';
                    overlay.style.backgroundColor = isBlack ? (data.color || "white") : 'black';
                    if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: isBlack}]}).catch(()=>{});
                }, 120);
            }
            if(data.action === "light_winner_found") {
                clearInterval(flashInt);
                overlay.style.backgroundColor = (data.winner_id === myId) ? (data.color || "white") : "black";
                if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: data.winner_id === myId}]}).catch(()=>{});
                setTimeout(() => { overlay.style.display = "none"; if(videoTrack) videoTrack.applyConstraints({advanced:[{torch: false}]}).catch(()=>{}); }, 5000);
            }
            if(data.action === "reset") location.reload();
        };

        setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);
    </script>
</body>
</html>
