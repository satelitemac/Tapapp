<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T RADAR</title>
    <style>
        :root { --accent: #ff5e00; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; text-align: center; }
        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .btn { width: 100%; max-width: 250px; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; margin: 10px; cursor: pointer; }
        .radar-btn { width: 220px; height: 220px; border-radius: 50%; border: 10px solid white; background: none; color: white; font-size: 2rem; }
        #flash { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; display:none; }
    </style>
</head>
<body>
    <div id="screen-login" class="screen active">
        <h1 style="color:var(--accent)">HOLA!</h1>
        <input type="text" id="name" placeholder="Nombre" style="padding:15px; width:80%; border-radius:10px; margin-bottom:10px;">
        <input type="text" id="table" placeholder="Mesa" style="padding:15px; width:80%; border-radius:10px; margin-bottom:20px;">
        <button class="btn" style="background:var(--accent); color:white;" onclick="entrar()">ENTRAR</button>
    </div>

    <div id="screen-wait" class="screen"><h1>CONECTADO</h1><p>Espera al DJ...</p></div>
    <div id="screen-radar" class="screen">
        <h2 id="status">¡LISTOS!</h2>
        <button id="main-btn" class="radar-btn" onclick="pulsar()" disabled>ESPERA</button>
    </div>
    <div id="flash"></div>

    <script>
        let myId = "", videoTrack = null, socket = new WebSocket('wss://tapapp.onrender.com/ws');

        function entrar() {
            const n = document.getElementById('name').value, m = document.getElementById('table').value;
            if(!n || !m) return alert("Faltan datos");
            myId = `${n} (Mesa ${m})`;
            socket.send(JSON.stringify({type: "presence", user_id: myId}));
            // Cámara en segundo plano
            navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}})
                .then(s => videoTrack = s.getVideoTracks()[0]).catch(() => {});
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-wait').classList.add('active');
        }

        function pulsar() { socket.send(JSON.stringify({type: "player_click", user_id: myId})); }

        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.action === "prepare_contest") { 
                document.getElementById('screen-wait').classList.remove('active');
                document.getElementById('screen-radar').classList.add('active');
            }
            if(d.action === "go_pulsar") {
                const b = document.getElementById('main-btn'); b.disabled = false; b.innerText = "¡YA!";
            }
            if(d.action === "winner_found") {
                document.getElementById('main-btn').innerText = (d.winner_id === myId) ? "¡GANASTE!" : "CASI...";
            }
            if(d.action === "reset") location.reload();
        };

        setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type:"ping"})); }, 20000);
    </script>
</body>
</html>
