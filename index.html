<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T | RADAR APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --dj: #00d4ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; transition: background 0.4s; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; z-index: 10; }
        .input-field { width: 85%; max-width: 300px; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; background: #1a1a1a; color: white; font-size: 1rem; text-align: center; }
        .menu-btn { display: block; width: 100%; max-width: 280px; padding: 18px; margin: 10px; border-radius: 12px; border: 2px solid var(--accent); background: transparent; color: white; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .radar-button { width: 220px; height: 220px; border-radius: 50%; border: 8px solid white; background: transparent; color: white; font-size: 1.6rem; font-weight: 900; transition: 0.3s; }
        .radar-button:disabled { opacity: 0.3; transform: scale(0.9); }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        .tension { animation: blink 0.15s infinite alternate; }
        #flash-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:none; align-items:center; justify-content:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <h1 style="color:var(--accent);">HOLA!</h1>
        <p style="color: #666;">Identifícate para participar</p>
        <input type="text" id="reg-nombre" class="input-field" placeholder="Tu Nombre">
        <input type="text" id="reg-mesa" class="input-field" placeholder="Mesa">
        <button class="menu-btn" onclick="initApp()" style="background: var(--accent);">ENTRAR</button>
    </div>

    <div id="screen-welcome" class="screen">
        <h1 style="color:var(--accent);">T&T</h1>
        <button class="menu-btn" onclick="showScreen('screen-radar-waiting')">🕹️ ENTRAR AL RADAR</button>
        <button class="menu-btn" style="border-color:var(--dj); color:var(--dj)" onclick="showScreen('screen-dj')">🎵 PEDIR CANCIÓN</button>
    </div>

    <div id="screen-radar-waiting" class="screen">
        <h2 style="color:#444">ESPERANDO AL DJ...</h2>
        <p style="font-size:0.8rem; color:#222">El radar se activará pronto</p>
        <button onclick="showScreen('screen-welcome')" style="color:#666; background:none; border:none; margin-top:20px; font-weight:bold;">← VOLVER</button>
    </div>

    <div id="screen-radar" class="screen" style="z-index: 200;">
        <h2 id="status-text">¡PREPARADOS!</h2>
        <button id="radar-btn" class="radar-button" disabled>ESPERA...</button>
    </div>

    <div id="screen-dj" class="screen">
        <h2 style="color:var(--dj)">MENSAJE AL DJ</h2>
        <input type="text" id="dj-input" class="input-field" placeholder="Tu petición...">
        <button id="send-dj-btn" class="menu-btn" style="border-color:var(--dj); color:var(--dj)">ENVIAR</button>
        <button onclick="showScreen('screen-welcome')" style="color:#666; background:none; border:none; margin-top:20px; font-weight:bold;">← VOLVER</button>
    </div>

    <div id="flash-overlay"></div>

    <script>
        let myId = "";
        let videoTrack = null;
        let flashInterval = null;
        let contestColor = "#000000";
        let socket;

        const body = document.body;
        const radarBtn = document.getElementById('radar-btn');
        const statusTxt = document.getElementById('status-text');
        const overlay = document.getElementById('flash-overlay');

        function connectWS() {
            socket = new WebSocket('wss://tapapp.onrender.com/ws');
            
            socket.onopen = () => {
                const n = localStorage.getItem('tt_user_name');
                const m = localStorage.getItem('tt_user_table');
                if (n && m) {
                    myId = `${n} (Mesa ${m})`;
                    socket.send(JSON.stringify({ "type": "presence", "user_id": myId }));
                    showScreen('screen-welcome');
                }
            };

            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.action === "reset") {
                    stopAllEffects();
                    location.reload();
                }

                if (data.action === "prepare_contest") {
                    stopAllEffects();
                    contestColor = data.color || "#000000";
                    body.style.backgroundColor = contestColor;
                    const txtCol = getContrastYIQ(contestColor);
                    statusTxt.style.color = txtCol;
                    statusTxt.innerText = "¡PREPARADOS!";
                    radarBtn.style.color = txtCol;
                    radarBtn.style.borderColor = txtCol;
                    radarBtn.innerText = "ESPERA...";
                    radarBtn.disabled = true;
                    showScreen('screen-radar');
                }

                if (data.action === "start_tension") {
                    body.classList.add('tension');
                    statusTxt.innerText = "¡ATENTOS!";
                }

                if (data.action === "go_pulsar") {
                    body.classList.remove('tension');
                    radarBtn.disabled = false;
                    radarBtn.innerText = "¡DALE YA!";
                    statusTxt.innerText = "¡PULSA!";
                }

                if (data.action === "winner_found") {
                    radarBtn.disabled = true;
                    body.classList.remove('tension');
                    if (data.winner_id === myId) {
                        body.style.backgroundColor = "#2ecc71";
                        radarBtn.innerText = "¡GANASTE!";
                    } else {
                        body.style.backgroundColor = "#e74c3c";
                        radarBtn.innerText = "CASI...";
                    }
                    setTimeout(() => {
                        body.style.backgroundColor = "#000";
                        showScreen('screen-welcome');
                    }, 5000);
                }

                if (data.action === "start_flashing") {
                    stopAllEffects();
                    if (!videoTrack) await requestTorchPermission();
                    overlay.style.display = "flex";
                    const flashCol = data.color || "#ffffff";
                    flashInterval = setInterval(async () => {
                        const isBlack = overlay.style.backgroundColor === 'black' || overlay.style.backgroundColor === 'rgb(0, 0, 0)';
                        overlay.style.backgroundColor = isBlack ? flashCol : 'black';
                        if (videoTrack) {
                            try { await videoTrack.applyConstraints({ advanced: [{ torch: isBlack }] }); } catch(e){}
                        }
                    }, 120);
                }

                if (data.action === "light_winner_found") {
                    if (flashInterval) clearInterval(flashInterval);
                    overlay.style.display = "flex";
                    if (data.winner_id === myId) {
                        overlay.style.backgroundColor = data.color || "white";
                        overlay.innerHTML = "<h1 style='color:black'>🏆 ¡ERES EL ELEGIDO!</h1>";
                        if (videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: true }] }).catch(()=>{});
                    } else {
                        overlay.style.backgroundColor = "black";
                        overlay.innerHTML = "<h1 style='color:#222'>SUERTE...</h1>";
                    }
                }
            };

            socket.onclose = () => setTimeout(connectWS, 2000);
        }

        async function initApp() {
            await requestTorchPermission();
            const n = document.getElementById('reg-nombre').value.trim();
            const m = document.getElementById('reg-mesa').value.trim();
            if (n && m) {
                localStorage.setItem('tt_user_name', n);
                localStorage.setItem('tt_user_table', m);
                myId = `${n} (Mesa ${m})`;
                socket.send(JSON.stringify({ "type": "presence", "user_id": myId }));
                showScreen('screen-welcome');
            }
        }

        async function requestTorchPermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoTrack = stream.getVideoTracks()[0];
            } catch (e) { console.error("Sin cámara"); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function stopAllEffects() {
            if (flashInterval) clearInterval(flashInterval);
            overlay.style.display = "none";
            if (videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: false }] }).catch(()=>{});
        }

        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            if(hexcolor.length === 3) hexcolor = hexcolor.split('').map(c => c+c).join('');
            const r = parseInt(hexcolor.substr(0,2),16), g = parseInt(hexcolor.substr(2,2),16), b = parseInt(hexcolor.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? 'black' : 'white';
        }

        radarBtn.onclick = () => socket.send(JSON.stringify({ "type": "player_click", "user_id": myId }));
        
        document.getElementById('send-dj-btn').onclick = () => {
            const txt = document.getElementById('dj-input').value;
            if(txt) {
                socket.send(JSON.stringify({ "type": "dj_note", "text": txt, "user_id": myId }));
                showScreen('screen-welcome');
            }
        };

        connectWS();
    </script>
</body>
</html>
