<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&T | RADAR APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; transition: background 0.4s; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; z-index: 10; }
        .btn-radar { background: var(--accent); color: white; border: none; padding: 40px; border-radius: 50%; font-size: 2rem; font-weight: 900; width: 200px; height: 200px; cursor: pointer; box-shadow: 0 0 30px rgba(255, 94, 0, 0.4); }
    </style>
</head>
<body>
    <div id="screen-welcome" class="screen active">
        <h1>CONECTADO</h1>
        <p>Espera a que el DJ lance el Radar...</p>
    </div>

    <div id="screen-radar" class="screen">
        <button id="btn-pulsar" class="btn-radar">PULSA YA</button>
    </div>

    <script>
        let myId = "Usuario_" + Math.floor(Math.random()*1000);
        const socket = new WebSocket('wss://tapapp.onrender.com/ws');
        const radarBtn = document.getElementById('btn-pulsar');

        socket.onopen = () => {
            socket.send(JSON.stringify({ "type": "presence", "user_id": myId }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.action === "prepare_contest") showScreen('screen-radar');
            if (data.action === "winner_found") {
                radarBtn.disabled = true;
                if (data.winner_id === myId) {
                    document.body.style.backgroundColor = "#2ecc71";
                    radarBtn.innerText = "¡GANASTE!";
                } else {
                    document.body.style.backgroundColor = "#8b0000";
                    radarBtn.innerText = "CASI...";
                }
                setTimeout(() => {
                    document.body.style.backgroundColor = "#000";
                    showScreen('screen-welcome');
                    radarBtn.disabled = false;
                    radarBtn.innerText = "PULSA YA";
                }, 5000);
            }
            if (data.action === "reset") {
                document.body.style.backgroundColor = "#000";
                showScreen('screen-welcome');
            }
        };

        radarBtn.onclick = () => { 
            socket.send(JSON.stringify({ "type": "player_click", "user_id": myId })); 
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
