<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&T | ADMIN HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --bg: #0a0a0a; --panel: #151515; --light: #ffcc00; --dj: #00d4ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .panel { background: var(--panel); border-radius: 16px; padding: 25px; border: 1px solid #222; }
        
        h2 { color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; margin-top: 0; text-transform: uppercase; margin-bottom: 25px; }
        
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-family: 'Inter'; }
        
        .btn-prep { background: #444; color: white; border: 1px solid #666; }
        .btn-tens { background: #cc4b00; color: white; }
        .btn-go { background: #2ecc71; color: white; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .btn-flash { background: var(--light); color: black; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .btn-winner { background: white; color: black; border: 2px solid white; }
        .btn-reset { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; margin-top: 10px; font-size: 0.7rem; padding: 10px; }
        
        #user-list { background: #000; border-radius: 8px; padding: 10px; font-family: 'Space Mono'; font-size: 0.7rem; color: #888; max-height: 120px; overflow-y: auto; margin-top: 10px; border: 1px solid #222; word-break: break-all; }
        
        #notes-list { height: 180px; overflow-y: auto; background: #000; border-radius: 10px; padding: 15px; font-family: 'Space Mono', monospace; font-size: 0.85rem; border: 1px solid #222; margin-top: 10px; }
        .note { border-bottom: 1px solid #111; padding: 10px 0; color: var(--dj); animation: fadeIn 0.3s; }
        .note span { color: #555; display: block; font-size: 0.7rem; margin-bottom: 4px; text-transform: uppercase; }
        
        #winner-display { background: #000; border-radius: 12px; padding: 20px; margin-top: 15px; border: 2px dashed #333; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .winner-anim { color: #2ecc71; font-size: 1.5rem; font-weight: 900; animation: pulse 0.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:white; font-size: 1.2rem; margin-bottom: 30px;">TAPAPP <span style="color:var(--accent)">COMMAND CENTER</span></h1>

    <div class="grid">
        <div class="panel">
            <h2>👥 Usuarios Online: <span id="user-count" style="color:white">0</span></h2>
            
            <button onclick="limpiarVistaUsuarios()" style="background: transparent; color: #555; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; margin-bottom: 15px; font-family: 'Space Mono'; text-transform: uppercase; width: 100%;">
                🧹 Limpiar Lista Local
            </button>

            <div id="user-list">Esperando conexiones...</div>
            
            <h2 style="margin-top: 30px; color: var(--dj)">🎵 Peticiones</h2>
            <div id="notes-list">Esperando canciones...</div>
        </div>

        <div class="panel">
            <h2>🕹️ Radar Control</h2>
            <div class="controls">
                <button class="btn btn-prep" onclick="sendAction('prepare_contest')">1. Preparar Radar</button>
                <button class="btn btn-tens" onclick="sendAction('start_tension')">2. Activar Tensión</button>
                <button class="btn btn-go" onclick="sendAction('go_pulsar')">3. ¡LANZAR RADAR!</button>
                
                <div id="winner-display">
                    <div id="winner-text" style="color:#444">ESPERANDO GANADOR...</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>🔦 Momento Linternas</h2>
            <div class="controls">
                <div style="margin-bottom: 5px;">
                    <label style="color: #666; font-size: 0.7rem; font-family: 'Space Mono'; text-transform: uppercase;">Color de Acción:</label>
                    <input type="color" id="action-color" value="#ff5e00" style="width: 100%; height: 40px; border: 2px solid #333; border-radius: 8px; background: none; cursor: pointer; margin-top: 5px;">
                </div>

                <button class="btn btn-flash" onclick="sendAction('start_flashing')">⚡ Iniciar Parpadeo</button>
                <button class="btn btn-winner" onclick="sendAction('stop_flashing')">🌟 Detener y Elegir Ganador</button>
            </div>
            <button class="btn btn-reset" style="width:100%" onclick="sendAction('reset')">Resetear Todo el Sistema</button>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://tapapp.onrender.com/ws');
        let savedUsers = localStorage.getItem('active_users');
        let activeUsers = new Set(savedUsers ? JSON.parse(savedUsers) : []);

        function limpiarVistaUsuarios() {
            activeUsers.clear();
            updateUserUI();
            console.log("🧹 Lista local limpiada");
        }

        function sendAction(action) {
            const chosenColor = document.getElementById('action-color').value;
            let payload = { "type": "admin_action", "action": action, "color": chosenColor };

            if (action === "stop_flashing") {
                const usersArray = Array.from(activeUsers);
                if (usersArray.length > 0) {
                    const luckyWinner = usersArray[Math.floor(Math.random() * usersArray.length)];
                    payload.force_winner = luckyWinner; 
                } else {
                    alert("No hay usuarios conectados");
                    return;
                }
            }

            if (socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify(payload));

            if (action === "reset") {
                document.getElementById('winner-text').innerText = "ESPERANDO GANADOR...";
                document.getElementById('winner-display').style.borderColor = '#333';
            }
        }

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "presence" || data.type === "player_click") {
                if (data.user_id) {
                    activeUsers.add(data.user_id);
                    updateUserUI();
                }
            }

            if (data.type === "dj_note") {
                const list = document.getElementById('notes-list');
                if (list) {
                    if (list.innerText.includes("Esperando canciones")) list.innerHTML = '';
                    const div = document.createElement('div');
                    div.className = 'note';
                    const now = new Date();
                    const time = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
                    div.innerHTML = `<span>${time} - ${data.user_id}</span>${data.text}`;
                    list.prepend(div);
                }
            }

            if (data.action === "winner_found") {
                const display = document.getElementById('winner-text');
                display.innerHTML = `<span class="winner-anim">🏆 ${data.winner_id}</span>`;
                document.getElementById('winner-display').style.borderColor = '#2ecc71';
            }

            if (data.action === "reset") {
                document.getElementById('winner-text').innerText = "ESPERANDO GANADOR...";
                document.getElementById('winner-display').style.borderColor = '#333';
            }
        };

        function updateUserUI() {
            const countSpan = document.getElementById('user-count');
            const listDiv = document.getElementById('user-list');
            const usersArray = Array.from(activeUsers);
            if (countSpan) countSpan.innerText = usersArray.length;
            if (listDiv) listDiv.innerText = usersArray.length > 0 ? usersArray.join(", ") : "Esperando conexiones...";
            localStorage.setItem('active_users', JSON.stringify(usersArray));
        }

        socket.onopen = () => { console.log("✅ Admin Conectado"); updateUserUI(); };
        socket.onclose = () => { setTimeout(() => location.reload(), 1500); };
    </script>
</body>
</html>
