<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&T | ADMIN HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff5e00; --bg: #0a0a0a; --panel: #151515; --light: #ffcc00; --dj: #00d4ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .panel { background: var(--panel); border-radius: 16px; padding: 25px; border: 1px solid #222; }
        h2 { color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; margin-top: 0; text-transform: uppercase; margin-bottom: 25px; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-family: 'Inter'; }
        .btn-prep { background: #444; color: white; border: 1px solid #666; }
        .btn-tens { background: #cc4b00; color: white; }
        .btn-go { background: #2ecc71; color: white; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .btn-flash { background: var(--light); color: black; }
        .btn-winner { background: white; color: black; }
        .btn-reset { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; margin-top: 10px; font-size: 0.7rem; padding: 10px; }
        #user-list { background: #000; border-radius: 8px; padding: 10px; font-family: 'Space Mono'; font-size: 0.7rem; color: #888; max-height: 100px; overflow-y: auto; margin-top: 10px; border: 1px solid #222; }
        #notes-list { height: 200px; overflow-y: auto; background: #000; border-radius: 10px; padding: 15px; font-family: 'Space Mono'; font-size: 0.85rem; border: 1px solid #222; margin-top: 10px; }
        .note { border-bottom: 1px solid #111; padding: 10px 0; color: var(--dj); }
        .note span { color: #555; display: block; font-size: 0.7rem; margin-bottom: 4px; }
        #winner-display { background: #000; border-radius: 12px; padding: 20px; margin-top: 15px; border: 2px dashed #333; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .winner-anim { color: #2ecc71; font-size: 1.5rem; font-weight: 900; animation: pulse 0.5s infinite; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:white; font-size: 1.2rem; margin-bottom: 30px;">T&T <span style="color:var(--accent)">DJ COMMAND CENTER</span></h1>

    <div class="grid">
        <div class="panel">
            <h2>👥 ONLINE: <span id="user-count" style="color:white">0</span></h2>
            <div id="user-list">Esperando conexiones...</div>
            
            <h2 style="margin-top: 30px; color: var(--dj)">🎵 PETICIONES</h2>
            <div id="notes-list">Ninguna petición todavía...</div>
        </div>

        <div class="panel">
            <h2>🕹️ RADAR CONTROL</h2>
            <div class="controls">
                <button class="btn btn-prep" onclick="sendAction('prepare_contest')">1. Preparar Radar</button>
                <button class="btn btn-go" onclick="sendAction('go_pulsar')">2. ¡SOLTAR BOTÓN!</button>
                
                <div id="winner-display">
                    <div id="winner-text" style="color:#444">ESPERANDO GANADOR...</div>
                </div>
                <button class="btn btn-reset" onclick="sendAction('reset')">Resetear Todo</button>
            </div>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://tapapp.onrender.com/ws');
        let activeUsers = new Set();

        function sendAction(action) {
            let payload = { "type": "admin_action", "action": action, "user_id": "ADMIN_PANEL" };
            if (socket.readyState === 1) {
                socket.send(JSON.stringify(payload));
                console.log("Acción enviada:", action);
            }
        }

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // 1. Registro de usuarios
            if (data.user_id && data.user_id !== "ADMIN_PANEL") {
                activeUsers.add(data.user_id);
                updateUserUI();
            }

            // 2. Mensajes al DJ
            if (data.type === "dj_note") {
                const list = document.getElementById('notes-list');
                if (list.innerText.includes("Ninguna petición")) list.innerHTML = '';
                const div = document.createElement('div');
                div.className = 'note';
                const now = new Date();
                const time = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
                div.innerHTML = `<span>${time} - ${data.user_id}</span>${data.text}`;
                list.prepend(div);
            }

            // 3. Ganador del Radar
            if (data.action === "winner_found") {
                const display = document.getElementById('winner-text');
                display.innerHTML = `<span class="winner-anim">🏆 ${data.winner_id}</span>`;
                document.getElementById('winner-display').style.borderColor = '#2ecc71';
            }

            if (data.action === "reset") {
                document.getElementById('winner-text').innerText = "ESPERANDO GANADOR...";
                document.getElementById('winner-display').style.borderColor = '#333';
            }
        };

        function updateUserUI() {
            document.getElementById('user-count').innerText = activeUsers.size;
            document.getElementById('user-list').innerText = Array.from(activeUsers).join(", ");
        }

        socket.onopen = () => {
            console.log("Mando conectado");
            socket.send(JSON.stringify({ "type": "presence", "user_id": "ADMIN_PANEL" }));
        };

        // Reconexión automática
        socket.onclose = () => setTimeout(() => location.reload(), 2000);
    </script>
</body>
</html>
