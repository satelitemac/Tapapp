<script>
    const socket = new WebSocket('wss://tapapp.onrender.com/ws');
    
    function sendAction(action) {
        socket.send(JSON.stringify({
            "type": "admin_action", 
            "action": action, 
            "user_id": "ADMIN_PANEL"
        }));
    }

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.action === "winner_found") {
            document.getElementById('ganador-actual').innerText = "Ganador: " + data.winner_id;
        }
        if (data.action === "reset") {
            document.getElementById('ganador-actual').innerText = "Esperando...";
        }
    };
</script>
